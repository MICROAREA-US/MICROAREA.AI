<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2130b7" />
      <stop offset="100%" stop-color="#4c12a4" />
    </linearGradient>
    <linearGradient id="pastelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e2e4ff" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#0072ff" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe600" />
      <stop offset="100%" stop-color="#ff6a00" />
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.75" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0.1" />
    </linearGradient>
    <filter id="svgBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#192a7a" flood-opacity="0.2"/>
    </filter>
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <ellipse cx="80" cy="128" rx="42" ry="10" fill="#000000" opacity="0.08" filter="url(#svgBlur)"/>
  <g filter="url(#shadow)">
    <path d="M 80,124 L 122,104 L 80,84 L 38,104 Z" fill="url(#pastelGrad)" stroke="#85a7e6" stroke-width="1.2"/>
    <path d="M 80,124 L 122,104 L 122,108 L 80,128 Z" fill="#b9beed"/>
    <path d="M 38,104 L 80,124 L 80,128 L 38,108 Z" fill="#cfd3f5"/>
  </g>
  <g transform="translate(5, -8)" filter="url(#shadow)">
    <path d="M 58,97 L 102,77 L 102,39 L 58,59 Z" fill="url(#blueGrad)" stroke="#00f0ff" stroke-width="0.8" filter="url(#neonGlow)"/>
    <path d="M 60,94 L 100,74 L 100,42 L 60,62 Z" fill="#ffffff"/>
    <circle cx="65" cy="51.5" r="1.2" fill="#ff4d4d"/>
    <circle cx="69" cy="49.7" r="1.2" fill="#ffab00"/>
    <circle cx="73" cy="47.9" r="1.2" fill="#00e676"/>
    <path d="M 64,66 L 80,58.6 L 80,66.6 L 64,74 Z" fill="url(#cyanGrad)"/>
    <path d="M 64,66 L 80,58.6 L 80,59.6 L 64,67 Z" fill="#ffffff" opacity="0.5"/>
    <path d="M 82,57.6 L 96,51 L 96,59 L 82,65.6 Z" fill="url(#blueGrad)"/>
    <path d="M 82,57.6 L 96,51 L 96,52 L 82,58.6 Z" fill="#ffffff" opacity="0.4"/>
    <path d="M 64,80 L 88,69" stroke="#e2e4ff" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 64,86 L 80,78.6" stroke="#e2e4ff" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <g transform="translate(-12, -12)" filter="url(#shadow)">
    <path d="M 60,102 L 105,81 L 80,69 L 35,90 Z" fill="url(#glassGrad)" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="48" y1="84" x2="78" y2="70" stroke="#2130b7" stroke-width="3" stroke-linecap="round"/>
    <circle cx="62" cy="77.5" r="4.2" fill="#00f0ff" stroke="#ffffff" stroke-width="1.2" filter="url(#neonGlow)"/>
    <g transform="translate(80, 78)">
      <path d="M -5,4 L 5,4 L 5,6 L -5,6 Z" fill="#141d6f"/>
      <circle cx="0" cy="0" r="6" fill="none" stroke="#2130b7" stroke-width="2.5" stroke-dasharray="2 1"/>
      <circle cx="0" cy="0" r="2.2" fill="#00f0ff" filter="url(#neonGlow)"/>
    </g>
    <g transform="translate(90, 73.5)" filter="url(#neonGlow)">
      <path d="M -3.5,3 L 3.5,3 L 3.5,4.5 L -3.5,4.5 Z" fill="#995a00"/>
      <circle cx="0" cy="0" r="4" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-dasharray="1.5 1"/>
      <circle cx="0" cy="0" r="1.2" fill="#ffffff"/>
    </g>
  </g>
</svg>