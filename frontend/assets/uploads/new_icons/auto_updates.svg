<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2130b7" />
      <stop offset="100%" stop-color="#4c12a4" />
    </linearGradient>
    <linearGradient id="pastelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e2e4ff" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#0072ff" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffaa" />
      <stop offset="100%" stop-color="#00aa55" />
    </linearGradient>
    <filter id="svgBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#192a7a" flood-opacity="0.2"/>
    </filter>
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <ellipse cx="80" cy="128" rx="42" ry="10" fill="#000000" opacity="0.08" filter="url(#svgBlur)"/>
  <g filter="url(#shadow)">
    <path d="M 80,124 L 122,104 L 80,84 L 38,104 Z" fill="url(#pastelGrad)" stroke="#85a7e6" stroke-width="1.2"/>
    <path d="M 80,124 L 122,104 L 122,108 L 80,128 Z" fill="#b9beed"/>
    <path d="M 38,104 L 80,124 L 80,128 L 38,108 Z" fill="#cfd3f5"/>
  </g>
  <g transform="translate(0, -10)" filter="url(#shadow)">
    <path d="M 58,97 L 102,77 L 102,39 L 58,59 Z" fill="url(#blueGrad)" stroke="#00f0ff" stroke-width="0.8" filter="url(#neonGlow)"/>
    <path d="M 60,94 L 100,74 L 100,42 L 60,62 Z" fill="#ffffff"/>
    <circle cx="65" cy="51.5" r="1.2" fill="#ff4d4d"/>
    <circle cx="69" cy="49.7" r="1.2" fill="#ffab00"/>
    <path d="M 66,74 L 94,61.5" stroke="#e2e4ff" stroke-width="3" stroke-linecap="round"/>
    <path d="M 66,74 L 91.2,62.8" stroke="url(#cyanGrad)" stroke-width="3" stroke-linecap="round" filter="url(#neonGlow)"/>
  </g>
  <g transform="translate(80, 72) scale(0.95)" filter="url(#shadow)">
    <path d="M 0,-15 L 12,-10 L 12,5 C 12,12 0,18 0,18 C 0,18 -12,12 -12,5 L -12,-10 Z" fill="url(#blueGrad)" stroke="#ffffff" stroke-width="1.5"/>
    <path d="M 0,-12 L 9,-8 L 9,4 C 9,9 0,14 0,14 C 0,14 -9,9 -9,4 L -9,-8 Z" fill="url(#greenGrad)" opacity="0.7" filter="url(#neonGlow)"/>
    <path d="M -5,2 L -1,6 L 6,-1" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(-10, -5)" filter="url(neonGlow)">
    <path d="M 68,64 A 20,20 0 0,1 92,58" fill="none" stroke="#00f0ff" stroke-width="2" stroke-linecap="round"/>
    <polygon points="92,54 96,61 89,61" fill="#ffffff"/>
    <path d="M 92,78 A 20,20 0 0,1 68,84" fill="none" stroke="#00f0ff" stroke-width="2" stroke-linecap="round"/>
    <polygon points="68,88 64,81 71,81" fill="#ffffff"/>
  </g>
</svg>