<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2130b7" />
      <stop offset="100%" stop-color="#4c12a4" />
    </linearGradient>
    <linearGradient id="pastelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e2e4ff" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#0072ff" />
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#e2e4ff" stop-opacity="0.1" />
    </linearGradient>
    <filter id="svgBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#192a7a" flood-opacity="0.2"/>
    </filter>
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <ellipse cx="80" cy="128" rx="42" ry="10" fill="#000000" opacity="0.08" filter="url(#svgBlur)"/>
  <g filter="url(#shadow)">
    <path d="M 80,124 L 122,104 L 80,84 L 38,104 Z" fill="url(#pastelGrad)" stroke="#85a7e6" stroke-width="1.2"/>
    <path d="M 80,124 L 122,104 L 122,108 L 80,128 Z" fill="#b9beed"/>
    <path d="M 38,104 L 80,124 L 80,128 L 38,108 Z" fill="#cfd3f5"/>
  </g>
  <g stroke="#00f0ff" stroke-width="2" stroke-dasharray="3 3" opacity="0.9" filter="url(#shadow)">
    <line x1="80" y1="80" x2="54" y2="53"/>
    <line x1="80" y1="80" x2="106" y2="58"/>
    <line x1="80" y1="80" x2="80" y2="92"/>
    <circle cx="80" cy="80" r="3.5" fill="#2130b7" stroke="#ffffff" stroke-width="1" filter="url(#neonGlow)"/>
    <circle cx="67" cy="66.5" r="1.5" fill="#ffffff" filter="url(#neonGlow)"/>
    <circle cx="93" cy="69" r="1.5" fill="#ffffff" filter="url(#neonGlow)"/>
  </g>
  <g transform="translate(-14, -25)" filter="url(#shadow)">
    <path d="M 60,85 L 100,67 L 75,55 L 35,73 Z" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.85)" stroke-width="1.2"/>
    <circle cx="67" cy="68" r="4.5" fill="#fbd3b6"/>
    <path d="M 62.5,68 C 62.5,63.5 71.5,63.5 71.5,68 Z" fill="#4c12a4"/>
    <path d="M 59,79 C 59,74 75,74 75,79 Z" fill="#4471b1"/>
  </g>
  <g transform="translate(10, -18)" filter="url(#shadow)">
    <path d="M 60,85 L 100,67 L 75,55 L 35,73 Z" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.85)" stroke-width="1.2"/>
    <circle cx="67" cy="68" r="4.5" fill="#fbd3b6"/>
    <path d="M 62.5,68 C 62.5,63.5 71.5,63.5 71.5,68 Z" fill="#00f0ff"/>
    <path d="M 59,79 C 59,74 75,74 75,79 Z" fill="#2130b7"/>
  </g>
  <g transform="translate(0, 0)" filter="url(#shadow)">
    <path d="M 60,85 L 100,67 L 75,55 L 35,73 Z" fill="#ffffff" stroke="#2130b7" stroke-width="1.5" filter="url(#neonGlow)"/>
    <circle cx="67" cy="68" r="5" fill="#fbd3b6"/>
    <path d="M 62,68 C 62,63 72,63 72,68 Z" fill="#ffab00"/>
    <path d="M 58,79 C 58,73 76,73 76,79 Z" fill="url(#cyanGrad)"/>
