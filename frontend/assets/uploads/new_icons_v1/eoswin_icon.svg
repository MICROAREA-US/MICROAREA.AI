<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="mainBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2130b7" />
      <stop offset="100%" stop-color="#141d6f" />
    </linearGradient>
    <linearGradient id="pastelBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#d9e6f7" />
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#85a7e6" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#4471b1" stop-opacity="0.1" />
    </linearGradient>
    <filter id="svgBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="8" flood-color="#192a7a" flood-opacity="0.15"/>
    </filter>
  </defs>

  <ellipse cx="200" cy="320" rx="120" ry="25" fill="#000000" opacity="0.08" filter="url(#svgBlur)"/>

  <!-- Base Platform -->
  <g filter="url(#shadow)">
    <path d="M 200,310 L 310,255 L 200,200 L 90,255 Z" fill="url(#pastelBlue)" stroke="#85a7e6" stroke-width="1.5"/>
    <path d="M 200,310 L 310,255 L 310,263 L 200,318 Z" fill="#b3cced"/>
    <path d="M 90,255 L 200,310 L 200,318 L 90,263 Z" fill="#cfdff5"/>
  </g>

  <!-- Tax Forms / Declaraciones de Impuestos -->
  <g transform="translate(0, -10)" filter="url(#shadow)">
    <path d="M 150,260 L 250,210 L 200,180 L 100,230 Z" fill="#ffffff" stroke="#4471b1" stroke-width="1.5"/>
    <!-- Form line details -->
    <line x1="120" y1="215" x2="170" y2="190" stroke="#b3cced" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="120" y1="225" x2="190" y2="190" stroke="#2130b7" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="150" y1="235" x2="210" y2="205" stroke="#4471b1" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Tax Percentage Symbol floating (%) -->
  <g transform="translate(30, -60)" filter="url(#shadow)">
    <path d="M 200,210 L 260,180 L 200,150 L 140,180 Z" fill="url(#glassGrad)" stroke="#2130b7" stroke-width="1.5"/>
    
    <g transform="translate(200, 180)" stroke="#2130b7" stroke-width="2.5" fill="none">
      <!-- diagonal -->
      <line x1="-8" y1="8" x2="8" y2="-8" stroke-linecap="round"/>
      <!-- circles -->
      <circle cx="-7" cy="-5" r="3.5"/>
      <circle cx="7" cy="5" r="3.5"/>
    </g>
  </g>

  <!-- Calendar Page / Tax deadlines floating -->
  <g transform="translate(-40, -75)" filter="url(#shadow)">
    <rect x="180" y="160" width="40" height="40" rx="4" fill="#ffffff" stroke="#2130b7" stroke-width="2"/>
    <rect x="180" y="160" width="40" height="10" fill="url(#mainBlue)"/>
    <circle cx="190" cy="182" r="3" fill="#2130b7"/>
    <circle cx="210" cy="182" r="3" fill="#b3cced"/>
  </g>
</svg>