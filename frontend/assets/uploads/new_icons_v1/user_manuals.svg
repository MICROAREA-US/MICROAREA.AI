<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2130b7" />
      <stop offset="100%" stop-color="#141d6f" />
    </linearGradient>
    <linearGradient id="pastelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#d9e6f7" />
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#85a7e6" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#4471b1" stop-opacity="0.15" />
    </linearGradient>
    <filter id="svgBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="3.5" flood-color="#192a7a" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Ground Shadow -->
  <ellipse cx="80" cy="130" rx="55" ry="12" fill="#000000" opacity="0.08" filter="url(#svgBlur)"/>

  <!-- Base Isometric Platform -->
  <g filter="url(#shadow)">
    <path d="M 80,126 L 130,103 L 80,80 L 30,103 Z" fill="url(#pastelGrad)" stroke="#85a7e6" stroke-width="1"/>
    <path d="M 80,126 L 130,103 L 130,107 L 80,130 Z" fill="#b3cced"/>
    <path d="M 30,103 L 80,126 L 80,130 L 30,107 Z" fill="#cfdff5"/>
  </g>

  <!-- Open Book in 3D perspective -->
  <g transform="translate(0, -10)" filter="url(#shadow)">
    <!-- Right Page -->
    <path d="M 80,95 L 125,73 L 85,55 L 40,77 Z" fill="#ffffff" stroke="#4471b1" stroke-width="1"/>
    <!-- Left Page -->
    <path d="M 80,95 L 35,75 L 75,57 L 120,77 Z" fill="#ffffff" stroke="#2130b7" stroke-width="1.5"/>
    <!-- Spine of the book -->
    <line x1="80" y1="95" x2="80" y2="55" stroke="#2130b7" stroke-width="2"/>
    
    <!-- Left page text lines -->
    <path d="M 45,71 L 70,60" stroke="#b3cced" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 45,78 L 70,67" stroke="#b3cced" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Right page text lines -->
    <path d="M 85,58 L 110,69" stroke="#b3cced" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 85,65 L 110,76" stroke="#b3cced" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Magnifying Glass floating above book -->
  <g transform="translate(10, -32)" filter="url(#shadow)">
    <!-- Glass Lens plate -->
    <path d="M 60,85 L 100,67 L 75,55 L 35,73 Z" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.75)" stroke-width="1.2"/>
    
    <!-- Magnifying glass drawing -->
    <g transform="translate(68, 68)">
      <circle cx="-2" cy="-2" r="6.5" fill="none" stroke="#2130b7" stroke-width="2.2"/>
      <line x1="2.5" y1="2.5" x2="7.5" y2="7.5" stroke="#2130b7" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>
</svg>