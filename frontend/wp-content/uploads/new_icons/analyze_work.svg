    <circle cx="65" cy="68.5" r="2.5" fill="#ffffff" stroke="#ff007f" stroke-width="1.5"/>
    <circle cx="77" cy="51.5" r="2.5" fill="#ffffff" stroke="#ff007f" stroke-width="1.5"/>
    <circle cx="89" cy="34.5" r="3.8" fill="#ffffff" stroke="#ff007f" stroke-width="2" filter="url(#neonGlow)"/>
  </g>
</svg>