<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2130b7" />
      <stop offset="100%" stop-color="#4c12a4" />
    </linearGradient>
    <linearGradient id="pastelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e2e4ff" />
    </linearGradient>
    <filter id="svgBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#192a7a" flood-opacity="0.2"/>
    </filter>
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Ground Shadow -->
  <ellipse cx="80" cy="128" rx="42" ry="10" fill="#000000" opacity="0.08" filter="url(#svgBlur)"/>

  <!-- Base Platform -->
  <g filter="url(#shadow)">
    <path d="M 80,124 L 122,104 L 80,84 L 38,104 Z" fill="url(#pastelGrad)" stroke="#85a7e6" stroke-width="1.2"/>
    <path d="M 80,124 L 122,104 L 122,108 L 80,128 Z" fill="#b9beed"/>
    <path d="M 38,104 L 80,124 L 80,128 L 38,108 Z" fill="#cfd3f5"/>
  </g>

  <!-- Desktop Screen standing (Isometric - Slender) -->
  <g transform="translate(0, -6)" filter="url(#shadow)">
    <path d="M 72,110 L 88,103 L 88,105 L 72,112 Z" fill="#b9beed"/>
    <path d="M 76,108 L 76,96 L 84,92 L 84,104 Z" fill="#2130b7"/>
    <path d="M 58,97 L 102,77 L 102,39 L 58,59 Z" fill="url(#blueGrad)" stroke="#00f0ff" stroke-width="0.8" filter="url(#neonGlow)"/>
    <path d="M 60,94 L 100,74 L 100,42 L 60,62 Z" fill="#ffffff"/>
    
    <!-- Support Agent Avatar inside screen -->
    <g transform="skewY(-25) translate(-14, 82)">
      <path d="M 87,92 C 87,85 103,85 103,92 Z" fill="#2130b7"/>
      <path d="M 93,89 L 95,92 L 97,89 Z" fill="#ffffff"/>
      <circle cx="95" cy="80" r="5" fill="#fbd3b6"/>
      <path d="M 90,80 C 90,74 100,74 100,80 Z" fill="#4c12a4"/>
      <path d="M 91,80 A 4,4 0 0,1 99,80" fill="none" stroke="#00f0ff" stroke-width="1.2"/>
      <circle cx="91" cy="80" r="0.8" fill="#00f0ff"/>
      <circle cx="99" cy="80" r="0.8" fill="#00f0ff"/>
    </g>
  </g>

  <!-- Premium 3D Headset wrapping monitor -->
  <g transform="translate(0, -6)" filter="url(#shadow)">
    <path d="M 55,73 C 55,45 105,22 105,48" fill="none" stroke="#2130b7" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M 55,73 C 55,45 105,22 105,48" fill="none" stroke="#ffffff" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
    <ellipse cx="55" cy="73" rx="4.8" ry="9" fill="#2130b7" transform="rotate(-25, 55, 73)"/>
    <ellipse cx="55" cy="73" rx="2.8" ry="6" fill="#00f0ff" transform="rotate(-25, 55, 73)" filter="url(#neonGlow)"/>
    <ellipse cx="105" cy="48" rx="4.8" ry="9" fill="#2130b7" transform="rotate(-25, 105, 48)"/>
    <ellipse cx="105" cy="48" rx="2.8" ry="6" fill="#00f0ff" transform="rotate(-25, 105, 48)" filter="url(#neonGlow)"/>
    <path d="M 55,73 Q 57,86 70,82" fill="none" stroke="#00f0ff" stroke-width="2" stroke-linecap="round" filter="url(#neonGlow)"/>
    <circle cx="70" cy="82" r="1.8" fill="#ffffff" filter="url(#neonGlow)"/>
  </g>
</svg>