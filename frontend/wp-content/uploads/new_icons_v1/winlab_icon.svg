<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="mainBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2130b7" />
      <stop offset="100%" stop-color="#141d6f" />
    </linearGradient>
    <linearGradient id="pastelBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#d9e6f7" />
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#85a7e6" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#4471b1" stop-opacity="0.1" />
    </linearGradient>
    <filter id="svgBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="8" flood-color="#192a7a" flood-opacity="0.15"/>
    </filter>
  </defs>

  <ellipse cx="200" cy="320" rx="120" ry="25" fill="#000000" opacity="0.08" filter="url(#svgBlur)"/>

  <!-- Base Platform -->
  <g filter="url(#shadow)">
    <path d="M 200,310 L 310,255 L 200,200 L 90,255 Z" fill="url(#pastelBlue)" stroke="#85a7e6" stroke-width="1.5"/>
    <path d="M 200,310 L 310,255 L 310,263 L 200,318 Z" fill="#b3cced"/>
    <path d="M 90,255 L 200,310 L 200,318 L 90,263 Z" fill="#cfdff5"/>
  </g>

  <!-- Payroll Sheets stacked (Trabajo) -->
  <g transform="translate(0, -15)">
    <!-- Sheet 1 (Bottom) -->
    <path d="M 180,250 L 270,205 L 190,165 L 100,210 Z" fill="#ffffff" stroke="#4471b1" stroke-width="1.5" filter="url(#shadow)"/>
    <!-- Sheet 2 (Middle) -->
    <path d="M 190,235 L 280,190 L 200,150 L 110,195 Z" fill="#ffffff" stroke="#2130b7" stroke-width="1.5" filter="url(#shadow)"/>
    <line x1="140" y1="185" x2="190" y2="160" stroke="#4471b1" stroke-width="2" stroke-linecap="round"/>
    <line x1="140" y1="195" x2="220" y2="155" stroke="#d9e6f7" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Money / Stacks of Coins (Dinero) -->
  <g transform="translate(60, -35)" filter="url(#shadow)">
    <!-- Coin Column Left -->
    <path d="M 140,240 L 170,225 L 140,210 L 110,225 Z" fill="#eaf1fb" stroke="#4471b1" stroke-width="1"/>
    <path d="M 110,225 L 140,240 L 140,248 L 110,233 Z" fill="#b3cced"/>
    <path d="M 140,240 L 170,225 L 170,233 L 140,248 Z" fill="#cfdff5"/>

    <path d="M 140,228 L 170,213 L 140,198 L 110,213 Z" fill="#eaf1fb" stroke="#4471b1" stroke-width="1"/>
    <path d="M 110,213 L 140,228 L 140,236 L 110,221 Z" fill="#b3cced"/>
    <path d="M 140,228 L 170,213 L 170,221 L 140,236 Z" fill="#cfdff5"/>
  </g>

  <!-- User profile / Human Resources symbol floating -->
  <g transform="translate(-15, -75)" filter="url(#shadow)">
    <path d="M 200,230 L 260,200 L 200,170 L 140,200 Z" fill="url(#glassGrad)" stroke="#2130b7" stroke-width="1.5"/>
    <circle cx="200" cy="190" r="9" fill="#2130b7"/>
    <path d="M 185,212 C 185,202 215,202 215,212 Z" fill="#2130b7"/>
  </g>
</svg>